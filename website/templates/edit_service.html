{% extends "base.html"%}{% block content %}
<h2>Edit What You Want</h2>
<form method="POST" action="/edit/{{ service.id }}">
    <div class="form-group">
    <label for="name">Name:</label>
    <input type="text" class="form-control" id="name" name="name" value="{{ service.name }}" required>
</div> 
<div class="form-group">
    <label for="description">Description:</label>
    <textarea id="description"  class="form-control" name="description" required>{{ service.description }}</textarea>
</div>
    <div class="form-group">
    <label for="base_price">Base Price</label>
    <input type="number" class="form-control" id="base_price" name="base_price" value="{{ service.base_price }}" required>
</div>

    <button type="submit" class="btn btn-primary">Save Changes</button>
</form>


{%endblock%}
