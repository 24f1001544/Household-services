{% extends "base.html" %} {% block title %}{% endblock %} {% block content
    %}
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" value="{{service_prof.email}}" />
          </div>
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" class="form-control" id="name" name="name" value="{{service_prof.name}}" />
          </div>
          <div class="input-group mt-4 w-100 form-group" id="serviceField">
            <label for="service_name">Select Your Service</label>
            <br>
            <select class="form-select form-control"  name="service_name" id="service_name">
              <option selected disabled>Select your service</option>
              {% for service in services %}
              <option>{{service.name}}</option>
          {% endfor %}
            </select>
          </div>
          <div class="form-group" id="descriptionField">
            <label for="description">Description</label>
            <input type="text" class="form-control " id="description" name="description" value="{{service_prof.description}}"/>
          </div>
          <div class="form-group">
            <label for="adress">Adress</label>
            <input type="text" class="form-control" id="adress" name="adress" value="{{service_prof.description}}" />
          </div>
          <div class="form-group">
            <label for="pincode">Pincode</label>
            <input type="number" class="form-control" id="pincode" name="pincode" value="{{service_prof.pincode}}" />
          </div>
          <div class="form-group">
            <label for="exp">Experience(in years)</label>
            <input type="number" class="form-control" id="exp" name="exp" value="{{service_prof.experience}}" />
          </div>
          <br/>
        <button type="submit" class="btn btn-success">Save Changes</button>
      </form>

      <br>

{%endblock%}
