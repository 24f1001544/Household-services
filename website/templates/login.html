{% extends "base.html" %} {% block title %}Login{% endblock %}{%block welcome%}<p class="nav-item nav-link">Login to Appq</p>{%endblock%} {% block content
%}

<form method="POST">

  <h3>Login</h3>

  <div class="input-group mt-4 w-100 form-group">
    <select class="form-select form-control" id="user_type" name="user_type">
      <option style="width: 50%;">Choose your role</option>
      <option value="admin">Admin</option>
      <option value="service">Service Professional</option>
      <option value="customer">Customer</option>
    </select>
  </div>

  <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required />
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required/>
  </div>
  <br />
  <button type="submit" class="btn btn-primary">Login</button>
</form>
{% endblock %}
