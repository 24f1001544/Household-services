{% extends "base.html"%}{% block content %}
<h2>Your Profile</h2>
<form method="POST" action="/customer/profile/edit">
    <div class="form-group">
    <label for="name">Name:</label>
    <input type="text" class="form-control" id="name" name="name" value="{{ customer.name }}" required>
</div> 
<div class="form-group">
    <label for="email">Email:</label>
    <input  type="text" id="email"  class="form-control" name="email" value="{{ customer.email }}" required></input>
</div>
    <div class="form-group">
    <label for="address">Address:</label>
    <input type="text" class="form-control" id="address" name="address" value="{{ customer.address }}" required>
</div>
<div class="form-group">
<label for="pincode">Address:</label>
<input type="number" class="form-control" id="pincode" name="pincode" value="{{ customer.pincode }}" required>
</div>
<div class="form-group">
    <label for="phone">Contact Number</label>
    <input type="number" class="form-control" id="phone" name="phone" value="{{ customer.phone }}" required>
</div>
<button type="submit" class="btn btn-primary">Save Changes</button>
</form>


{%endblock%}
